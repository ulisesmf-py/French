<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allons-y ! · Français A1 → B1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --beige:#F6F1E7;
  --beige-2:#EFE7D6;
  --card:#FDFBF6;
  --blue-100:#DCEAF2;
  --blue-300:#A9C9DB;
  --blue-500:#5B8BA8;
  --blue-700:#34607E;
  --ink:#22384A;
  --ink-soft:#5C6E7E;
  --accent:#D96C5F;
  --ok:#6F9B68;
  --line:#E3D9C4;
  --r:16px;
  --shadow:0 2px 12px rgba(34,56,74,.07);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Outfit',sans-serif;
  background:var(--beige);
  color:var(--ink);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.display{font-family:'Fraunces',serif}
.mono{font-family:'JetBrains Mono',monospace}

/* ---------- top bar ---------- */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(246,241,231,.88);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.bar{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
.logo{font-family:'Fraunces',serif;font-weight:700;font-size:1.25rem;cursor:pointer;letter-spacing:.2px}
.logo span{color:var(--blue-500)}
.bar .spacer{flex:1}
.xp{
  font-family:'JetBrains Mono',monospace;font-size:.8rem;
  background:var(--blue-100);color:var(--blue-700);
  padding:6px 14px;border-radius:999px;white-space:nowrap;
}

/* ---------- layout ---------- */
.wrap{max-width:1080px;margin:0 auto;padding:32px 24px 96px}
.crumb{font-size:.85rem;color:var(--ink-soft);margin-bottom:24px}
.crumb a{color:var(--blue-700);text-decoration:none;cursor:pointer}
.crumb a:hover{text-decoration:underline}

/* ---------- hero ---------- */
.hero{padding:56px 0 40px;text-align:center}
.hero .eyebrow{font-family:'JetBrains Mono',monospace;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;color:var(--blue-500);margin-bottom:18px}
.hero h1{font-family:'Fraunces',serif;font-size:clamp(2.4rem,6vw,4rem);font-weight:600;line-height:1.12;margin-bottom:18px}
.hero h1 em{font-style:italic;color:var(--blue-500)}
.hero p{max-width:540px;margin:0 auto;color:var(--ink-soft);font-size:1.05rem}

/* metro line of the method */
.methode{margin:48px auto 8px;max-width:760px}
.methode .titre{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:20px}
.ligne{display:flex;align-items:flex-start;position:relative}
.ligne::before{content:'';position:absolute;top:13px;left:7%;right:7%;height:3px;background:var(--blue-300);border-radius:2px}
.station{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1}
.station .dot{width:28px;height:28px;border-radius:50%;background:var(--card);border:3px solid var(--blue-500);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--blue-700);transition:.25s}
.station .lbl{font-size:.7rem;text-align:center;color:var(--ink-soft);max-width:86px;line-height:1.3}
.station.done .dot{background:var(--ok);border-color:var(--ok);color:#fff}
.station.now .dot{background:var(--blue-500);color:#fff;transform:scale(1.18)}
.station.now .lbl{color:var(--ink);font-weight:600}
.station.click{cursor:pointer}
.station.click:hover .dot{transform:scale(1.12)}

/* ---------- level cards ---------- */
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-top:48px}
.lvl{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:28px;cursor:pointer;transition:.25s;box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:10px;
}
.lvl:hover{transform:translateY(-4px);border-color:var(--blue-300)}
.lvl .tag{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:500;color:var(--blue-500)}
.lvl h3{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:600}
.lvl p{font-size:.9rem;color:var(--ink-soft)}
.lvl .prog{height:6px;background:var(--beige-2);border-radius:3px;overflow:hidden;margin-top:8px}
.lvl .prog i{display:block;height:100%;background:var(--blue-500);border-radius:3px;transition:.4s}
.lvl .pct{font-size:.75rem;color:var(--ink-soft);font-family:'JetBrains Mono',monospace}

/* ---------- topic list ---------- */
.lvl-head{margin-bottom:32px}
.lvl-head h2{font-family:'Fraunces',serif;font-size:2.2rem;font-weight:600;margin-bottom:8px}
.lvl-head p{color:var(--ink-soft);max-width:620px}
.topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.topic{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:18px 20px;display:flex;gap:14px;align-items:flex-start;transition:.2s;
}
.topic.open{cursor:pointer}
.topic.open:hover{border-color:var(--blue-300);transform:translateY(-2px)}
.topic .num{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--blue-500);background:var(--blue-100);border-radius:8px;padding:4px 8px;flex-shrink:0;margin-top:2px}
.topic h4{font-size:1rem;font-weight:600;line-height:1.35}
.topic p{font-size:.82rem;color:var(--ink-soft);margin-top:4px}
.topic .soon{font-size:.7rem;font-family:'JetBrains Mono',monospace;color:var(--accent);margin-top:8px;display:inline-block}
.topic .go{font-size:.7rem;font-family:'JetBrains Mono',monospace;color:var(--ok);margin-top:8px;display:inline-block}

/* ---------- topic view ---------- */
.t-head{margin-bottom:28px}
.t-head .lvl-tag{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--blue-500);letter-spacing:.12em}
.t-head h2{font-family:'Fraunces',serif;font-size:2rem;font-weight:600;margin:6px 0}
.t-head p{color:var(--ink-soft)}
.phase-box{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:32px;margin-top:28px;box-shadow:var(--shadow)}
.phase-box h3{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:600;margin-bottom:6px}
.phase-box .sub{color:var(--ink-soft);font-size:.9rem;margin-bottom:24px}
.nav-phases{display:flex;justify-content:space-between;margin-top:28px;gap:12px}

/* ---------- components ---------- */
.btn{
  font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:500;
  border:none;border-radius:12px;padding:11px 22px;cursor:pointer;transition:.2s;
}
.btn-p{background:var(--blue-500);color:#fff}
.btn-p:hover{background:var(--blue-700)}
.btn-g{background:var(--beige-2);color:var(--ink)}
.btn-g:hover{background:var(--line)}
.btn-ok{background:var(--ok);color:#fff}
.btn:disabled{opacity:.45;cursor:default}
.speak{
  background:var(--blue-100);border:none;border-radius:10px;cursor:pointer;
  padding:6px 12px;font-size:.85rem;color:var(--blue-700);transition:.2s;flex-shrink:0;
}
.speak:hover{background:var(--blue-300)}

/* vocab cards */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.vcard{background:var(--beige);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.vcard .row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.vcard .fr{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:600}
.vcard .ipa{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--blue-500);margin-top:2px}
.vcard .es{font-size:.88rem;color:var(--ink-soft);margin-top:6px}
.vcard .ex{font-size:.85rem;font-style:italic;color:var(--blue-700);margin-top:8px;border-left:3px solid var(--blue-300);padding-left:10px}

/* matching game */
.match{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:640px}
.mcol{display:flex;flex-direction:column;gap:10px}
.mitem{background:var(--beige);border:2px solid var(--line);border-radius:12px;padding:12px 16px;cursor:pointer;text-align:center;font-size:.92rem;transition:.18s;user-select:none}
.mitem:hover{border-color:var(--blue-300)}
.mitem.sel{border-color:var(--blue-500);background:var(--blue-100)}
.mitem.ok{border-color:var(--ok);background:#EDF3EA;color:var(--ok);cursor:default}
.mitem.bad{border-color:var(--accent);animation:shake .3s}
@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* dialogue */
.dlg{max-width:680px;display:flex;flex-direction:column;gap:12px}
.dline{display:flex;gap:12px;align-items:flex-start}
.dline .who{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--blue-500);min-width:64px;padding-top:10px;text-align:right}
.dline .bub{background:var(--beige);border:1px solid var(--line);border-radius:14px;padding:10px 16px;font-size:.95rem;flex:1}
.dline:nth-child(even) .bub{background:var(--blue-100);border-color:var(--blue-300)}
.dline .bub em{display:block;font-size:.78rem;color:var(--ink-soft);font-style:normal;margin-top:4px}

/* quiz */
.q{margin-bottom:26px;max-width:680px}
.q .stem{font-size:1rem;margin-bottom:12px}
.q .stem b{color:var(--blue-700)}
.opts{display:flex;flex-wrap:wrap;gap:10px}
.opt{background:var(--beige);border:2px solid var(--line);border-radius:12px;padding:10px 18px;cursor:pointer;font-size:.92rem;transition:.18s}
.opt:hover{border-color:var(--blue-300)}
.opt.ok{border-color:var(--ok);background:#EDF3EA;color:var(--ok);font-weight:600}
.opt.bad{border-color:var(--accent);background:#F8E9E6;color:var(--accent)}
.opt.lock{pointer-events:none;opacity:.6}
.opt.lock.ok,.opt.lock.bad{opacity:1}
.fb{font-size:.84rem;margin-top:10px;display:none}
.fb.show{display:block}
.fb.good{color:var(--ok)}
.fb.no{color:var(--accent)}

/* speaking situations */
.sit{background:var(--beige);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:16px;max-width:720px}
.sit h4{font-family:'Fraunces',serif;font-size:1.1rem;margin-bottom:6px}
.sit .ctx{font-size:.88rem;color:var(--ink-soft);margin-bottom:12px}
.sit ul{margin:0 0 12px 18px;font-size:.9rem}
.sit ul li{margin-bottom:4px}
.sit .modele{background:var(--card);border-left:3px solid var(--blue-500);border-radius:0 10px 10px 0;padding:12px 16px;font-style:italic;font-size:.9rem;color:var(--blue-700);margin-bottom:12px;white-space:pre-line}

/* listening */
.lq{background:var(--beige);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;max-width:680px}
.lq .play-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.lq .play-row span{font-size:.85rem;color:var(--ink-soft)}

/* grammar */
.gram{max-width:720px}
.gram h4{font-family:'Fraunces',serif;font-size:1.1rem;margin:22px 0 10px;color:var(--blue-700)}
.gram p{font-size:.94rem;margin-bottom:10px}
.gram table{border-collapse:collapse;margin:10px 0 18px;width:100%;max-width:460px;font-size:.92rem}
.gram td,.gram th{border:1px solid var(--line);padding:8px 14px;text-align:left}
.gram th{background:var(--blue-100);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:.78rem}
.gram td:first-child{background:var(--beige);font-weight:500}
.gram .tip{background:var(--blue-100);border-radius:12px;padding:14px 18px;font-size:.88rem;margin:14px 0}
.gram .tip b{color:var(--blue-700)}

.done-row{margin-top:32px;padding-top:24px;border-top:1px dashed var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.done-row .msg{font-size:.85rem;color:var(--ok);display:none}

footer{border-top:1px solid var(--line);padding:28px 24px;text-align:center;font-size:.78rem;color:var(--ink-soft)}
footer .mono{color:var(--blue-500)}

@media(max-width:640px){
  .phase-box{padding:22px 18px}
  .ligne .lbl{display:none}
  .match{grid-template-columns:1fr 1fr;gap:8px}
  .dline .who{min-width:46px}
}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

/* exámenes y bloqueo */
.topic.lockd{opacity:.55;background:var(--beige-2)}
.exam-card{border:2px dashed var(--blue-300);background:var(--blue-100)}
.exam-card.avail{cursor:pointer;border-style:solid}
.exam-card.avail:hover{transform:translateY(-2px);border-color:var(--blue-500)}
.exam-card.passed{border:2px solid var(--ok);background:#EDF3EA;cursor:pointer}
.opt.sel{border-color:var(--blue-500);background:var(--blue-100);font-weight:600}
.exam-ta{width:100%;min-height:120px;border:1px solid var(--line);border-radius:12px;padding:12px;font-family:'Outfit',sans-serif;font-size:.92rem;margin-top:10px;background:var(--card);resize:vertical}
.exam-res{margin-top:18px;padding:18px;border-radius:14px;font-size:.95rem}
.exam-res.pass{background:#EDF3EA;border:1px solid var(--ok)}
.exam-res.fail{background:#F8E9E6;border:1px solid var(--accent)}
/* video */
.vid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:14px}
.vid-card{display:flex;gap:14px;align-items:center;background:var(--beige);border:1px solid var(--line);border-radius:14px;padding:16px 18px;text-decoration:none;color:var(--ink);transition:.2s}
.vid-card:hover{border-color:var(--blue-300);transform:translateY(-2px)}
.vid-card .vid-ico{width:42px;height:42px;border-radius:12px;background:var(--blue-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.vid-card.tv5 .vid-ico{background:var(--accent)}
.vid-card strong{display:block;font-size:.95rem}
.vid-card span{font-size:.78rem;color:var(--ink-soft)}
/* lectura */
.lect-txt{background:var(--beige);border:1px solid var(--line);border-left:4px solid var(--blue-500);border-radius:0 14px 14px 0;padding:22px 26px;max-width:720px;font-size:.97rem;line-height:1.75}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo" onclick="showHome()">Allons-y<span> !</span></div>
    <div class="spacer"></div>
    <div class="xp" id="xpBox">0 XP</div>
  </div>
</header>
<main class="wrap" id="app"></main>
<footer>
  Contenido alineado al <span class="mono">CECR (A1–B1)</span> · Método: vocabulario → uso → gramática · Black IA
</footer>

 gram:{html:`
  <h4>1. El verbo <em>s'appeler</em> (llamarse)</h4>
  <p>Ya lo usaste toda la lección sin saberlo. Es un verbo pronominal: el pronombre cambia con la persona.</p>
  <table><tr><th>Persona</th><th>Forma</th></tr>
  <tr><td>je</td><td>je <b>m'appelle</b></td></tr>
  <tr><td>tu</td><td>tu <b>t'appelles</b></td></tr>
  <tr><td>il / elle</td><td>il/elle <b>s'appelle</b></td></tr>
  <tr><td>vous</td><td>vous <b>vous appelez</b></td></tr></table>
  <h4>2. El verbo <em>être</em> (ser / estar)</h4>
  <table><tr><th>Persona</th><th>Forma</th></tr>
  <tr><td>je</td><td>je <b>suis</b></td></tr>
  <tr><td>tu</td><td>tu <b>es</b></td></tr>
  <tr><td>il / elle</td><td>il/elle <b>est</b></td></tr>
  <tr><td>vous</td><td>vous <b>êtes</b></td></tr></table>
  <h4>3. ¿Tu o vous?</h4>
  <p><b>Tu</b> = informal (amigos, familia, compañeros). <b>Vous</b> = formal (desconocidos, profesores, situaciones profesionales) y también plural.</p>
  <div class="tip"><b>Astuce :</b> en Francia, ante la duda, empieza con <b>vous</b>. La otra persona te dirá « on peut se tutoyer » si quiere pasar al tu.</div>`,

 gram:{html:`
  <h4>1. El passé composé: la fórmula</h4>
  <p>Para contar acciones terminadas del pasado: <b>avoir o être (en presente) + participio pasado</b>.</p>
  <table><tr><th>Tipo</th><th>Ejemplo</th></tr>
  <tr><td>con avoir (la mayoría)</td><td>j'<b>ai regardé</b>, nous <b>avons fait</b></td></tr>
  <tr><td>con être (movimiento)</td><td>je <b>suis allé(e)</b>, ils <b>sont rentrés</b></td></tr>
  <tr><td>con être (pronominales)</td><td>je <b>me suis reposé(e)</b></td></tr></table>
  <h4>2. ¿Qué verbos van con être?</h4>
  <p>Los de movimiento o cambio de estado: <b>aller, venir, arriver, partir, entrer, sortir, monter, descendre, rentrer, retourner, rester, tomber, naître, mourir</b> — y todos los pronominales (se lever, se promener…).</p>
  <h4>3. La concordancia con être</h4>
  <p>Con être, el participio concuerda con el sujeto: elle est rentré<b>e</b>, ils sont rentré<b>s</b>, elles sont rentré<b>es</b>.</p>
  <div class="tip"><b>Astuce :</b> con avoir, el participio normalmente <b>no</b> cambia: elle a regardé, ils ont regardé.</div>`,

 gram:{html:`
  <h4>1. Opinión afirmativa → indicativo</h4>
  <p>Después de <b>je pense que, je crois que, je trouve que</b> (afirmativos), el verbo va en <b>indicativo</b>:</p>
  <p>→ Je pense qu'il <b>a</b> raison. · Je trouve que ce film <b>est</b> génial.</p>
  <h4>2. Opinión negativa → subjuntivo</h4>
  <p>En la forma negativa, la certeza desaparece y aparece el <b>subjuntivo</b>:</p>
  <p>→ Je ne pense pas que ce <b>soit</b> une bonne idée. · Je ne crois pas qu'elle <b>vienne</b>.</p>
  <table><tr><th>Afirmativo (indicativo)</th><th>Negativo (subjuntivo)</th></tr>
  <tr><td>Je pense que c'<b>est</b> vrai.</td><td>Je ne pense pas que ce <b>soit</b> vrai.</td></tr>
  <tr><td>Je crois qu'il <b>peut</b> venir.</td><td>Je ne crois pas qu'il <b>puisse</b> venir.</td></tr></table>
  <h4>3. Conectores de oposición</h4>
  <p><b>en revanche</b> (formal/escrito) y <b>par contre</b> (oral) oponen dos ideas. <b>Néanmoins</b> introduce una reserva: "sin embargo". <b>Mais</b> es el comodín universal.</p>
  <div class="tip"><b>Astuce :</b> este es tu primer contacto con el subjuntivo — lo estudiaremos a fondo en los temas 2 y 3. Por ahora, memoriza <b>ce soit</b> y <b>il/elle puisse</b> como fórmulas.</div>`,
 ex:[
  {stem:"« Je pense qu'il ____ raison. »",opts:['a','ait','aie'],a:0,fb:'Pensar afirmativo → indicativo: il a.'},
  {stem:'« Je ne pense pas que ce ____ une bonne idée. »',opts:['soit','est','es'],a:0,fb:'Negativo → subjuntivo: ce soit.'},
  {stem:'« Je trouve que cette chanson ____ magnifique. »',opts:['est','soit','sont'],a:0,fb:'Je trouve que (afirmativo) → indicativo: est.'},
  {stem:"« Je ne crois pas qu'elle ____ là. »",opts:['soit','est','sera'],a:0,fb:'Je ne crois pas que → subjuntivo: soit.'},
  {stem:'En un correo formal, para oponer dos ideas eliges:',opts:['en revanche','par contre','bof'],a:0,fb:'En revanche es el conector de registro formal/escrito.'},
 ]},
},

  <h4>1. Las letras “traicioneras” del alfabeto francés</h4>
  <p>La mayoría suenan parecido al español, pero memoriza estas:</p>
  <table><tr><th>Letra</th><th>Se pronuncia</th></tr>
  <tr><td>E</td><td>/ə/ (como “eu” suave)</td></tr>
  <tr><td>G</td><td>/ʒe/ (“llé” suave)</td></tr>
  <tr><td>J</td><td>/ʒi/ (“lli” suave)</td></tr>
  <tr><td>U</td><td>/y/ (una “i” con labios de “u”)</td></tr>
  <tr><td>W</td><td>double vé</td></tr>
  <tr><td>Y</td><td>i grec</td></tr></table>
  <h4>2. Los signos al deletrear</h4>
  <p>é = <b>accent aigu</b> · è = <b>accent grave</b> · ê = <b>accent circonflexe</b> · ç = <b>cédille</b> · ë = <b>tréma</b> · - = <b>tiret</b> · ' = <b>apostrophe</b></p>
  <h4>3. Fórmulas clave</h4>

 gram:{html:`
  <h4>1. La lógica de 0 a 69</h4>
  <p>0–16 tienen palabra propia. 17–19 se construyen: <b>dix-sept, dix-huit, dix-neuf</b>. Después: decena + unidad con guion.</p>
  <table><tr><th>Regla</th><th>Ejemplos</th></tr>
  <tr><td>decena + et un</td><td>vingt <b>et un</b> (21), trente <b>et un</b> (31)… hasta soixante et un (61)</td></tr>
  <tr><td>decena-unidad</td><td>vingt-deux (22), quarante-sept (47), soixante-neuf (69)</td></tr></table>
  <h4>2. La edad: con AVOIR, nunca con être</h4>
  <p>En francés la edad se <b>tiene</b>: <b>J'ai 25 ans</b> (literalmente "tengo 25 años", ¡igual que en español y al contrario que en inglés!). Nunca olvides la palabra <b>ans</b>.</p>
  <h4>3. Preguntar la edad</h4>
  <p>Informal: <b>Tu as quel âge ?</b> · Formal: <b>Quel âge avez-vous ?</b></p>
  <div class="tip"><b>Astuce :</b> la reforma ortográfica de 1990 permite escribir « vingt-et-un » todo con guiones, pero la forma clásica « vingt et un » sigue siendo la más común — reconoce ambas.</div>`,

 gram:{html:`
  <h4>1. Un / une : el género existe desde la primera palabra</h4>
  <p>Todo sustantivo francés es masculino o femenino. El artículo te lo dice:</p>
  <table><tr><th>Masculino</th><th>Femenino</th></tr>
  <tr><td><b>un</b> livre, <b>un</b> stylo, <b>un</b> cahier</td><td><b>une</b> gomme, <b>une</b> chaise, <b>une</b> table</td></tr>
  <tr><td><b>le</b> tableau, <b>le</b> professeur</td><td><b>la</b> classe, <b>la</b> page</td></tr></table>
  <p>Plural para ambos: <b>les</b> livres, <b>les</b> chaises. Ante vocal: <b>l'</b>école, <b>l'</b>élève.</p>
  <h4>2. Las consignas: el imperativo de vous</h4>
  <p>Las órdenes de clase usan la forma de vous sin el pronombre: <b>Écoutez ! Répétez ! Ouvrez ! Regardez !</b> Por ahora solo recónocelas — las conjugarás más adelante.</p>
  <div class="tip"><b>Astuce :</b> aprende cada sustantivo nuevo SIEMPRE con su artículo: no « livre » sino « <b>un</b> livre ». Tu yo del futuro te lo agradecerá.</div>`,

/* ================= ESTADO ================= */
const store={_m:{},
 get(k){try{return localStorage.getItem(k)??this._m[k]??null}catch(e){return this._m[k]??null}},
 set(k,v){try{localStorage.setItem(k,v)}catch(e){} this._m[k]=v}};
let state=JSON.parse(store.get('allonsy')||'{"xp":0,"done":{},"exams":{}}');
state.exams=state.exams||{};
function save(){store.set('allonsy',JSON.stringify(state));renderXP()}
function renderXP(){document.getElementById('xpBox').textContent=state.xp+' XP'}
function addXP(n){state.xp+=n;save()}
function phaseDone(tid,k){return !!(state.done[tid]&&state.done[tid][k])}
function markDone(tid,k){state.done[tid]=state.done[tid]||{};if(!state.done[tid][k]){state.done[tid][k]=true;addXP(15)}save()}
function topicProgress(tid){const d=state.done[tid]||{};return PHASES.filter(p=>d[p.k]).length}
function levelProgress(lv){const ts=LEVELS[lv].topics;let done=0,total=ts.length*PHASES.length;ts.forEach(t=>done+=topicProgress(t.id));return Math.round(done/total*100)}
function examPassed(id){return (state.exams[id]??-1)>=PASS_MARK}

/* ================= AUDIO (MP3 neuronal + fallback) ================= */
function djb2(s){s=s.replace(/\s+/g,' ').trim();let h=5381;for(let i=0;i<s.length;i++){h=((h*33)^s.charCodeAt(i))>>>0}return h.toString(36)}
let frVoiceF=null,frVoiceM=null;
function rankVoice(x,male){const n=x.name.toLowerCase();let s=0;
 if(n.includes('natural'))s+=100;if(n.includes('online'))s+=40;if(n.includes('google'))s+=50;
 if(n.includes('siri'))s+=45;if(x.lang==='fr-FR')s+=10;if(x.localService===false)s+=15;
 const fem=['denise','vivienne','eloise','amélie','amelie','audrey','julie','charlotte','hortense'];
 const mas=['henri','remy','rémy','thomas','paul','nicolas','claude','guy','jerome','jérôme'];
 (male?mas:fem).forEach(w=>{if(n.includes(w))s+=35});
 (male?fem:mas).forEach(w=>{if(n.includes(w))s-=60});
 return s}
function loadVoices(){const v=speechSynthesis.getVoices().filter(x=>x.lang.startsWith('fr'));
 if(!v.length){frVoiceF=frVoiceM=null;return}
 frVoiceF=[...v].sort((a,b)=>rankVoice(b,false)-rankVoice(a,false))[0];
 frVoiceM=[...v].sort((a,b)=>rankVoice(b,true)-rankVoice(a,true))[0]}
if('speechSynthesis' in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices}
let audioEl=null;
function stopAudio(){window.speechSynthesis&&speechSynthesis.cancel();if(audioEl){audioEl.pause();audioEl.onended=null;audioEl=null}}
function speak(t,rate,v,onend){
 stopAudio();
 const a=new Audio('audio/'+djb2(t)+(v==='m'?'_m':'')+'.mp3');
 a.playbackRate=(rate&&rate<0.85)?0.72:1;
 try{a.preservesPitch=true}catch(e){}
 if(onend)a.onended=onend;
 a.onerror=()=>speakTTS(t,rate,v,onend);
 a.play().catch(()=>speakTTS(t,rate,v,onend));
 audioEl=a;
}
function speakTTS(t,rate,v,onend){
 if(!('speechSynthesis' in window)){alert('Tu navegador no soporta síntesis de voz.');return}
 speechSynthesis.cancel();
 const u=new SpeechSynthesisUtterance(t);
 u.lang='fr-FR';const vo=(v==='m'?frVoiceM:frVoiceF);if(vo)u.voice=vo;u.rate=rate||0.92;
 if(onend)u.onend=onend;
 speechSynthesis.speak(u);
}
/* diálogo con voces alternadas hombre/mujer */
let seqCancel=false;
function playSeq(items,i){
 if(i===undefined){seqCancel=false;i=0}
 if(seqCancel||i>=items.length)return;
 speak(items[i].t,0.92,items[i].v,()=>setTimeout(()=>playSeq(items,i+1),450));
}
function playDialogue(tid){
 const c=CONTENT[tid],vmap=c.voices||{};
 playSeq(c.dec.lines.map(l=>({t:l[1],v:vmap[l[0]]||'f'})));
}

/* bloqueo: un tema está cerrado si hay un examen DEFINIDO anterior sin aprobar */
function isLocked(lv,idx){
 return (EXAM_PLAN[lv]||[]).some(e=>e.after<=idx && EXAMS[e.id] && !examPassed(e.id));
}
/* examen disponible: las 5 lecciones de su bloque completas (9/9 fases) y exámenes previos aprobados */
function examAvailable(lv,e){
 const prev=(EXAM_PLAN[lv]||[]).filter(x=>x.after<e.after);
 if(prev.some(x=>EXAMS[x.id]&&!examPassed(x.id)))return false;
 const block=LEVELS[lv].topics.slice(e.final?0:e.after-5,e.after);
 return block.every(t=>topicProgress(t.id)===PHASES.length);
}

function showLevel(lv){
 stopAudio();seqCancel=true;
 const L=LEVELS[lv];
 let h=`<div class="crumb"><a onclick="showHome()">Inicio</a> / ${lv}</div>
 <div class="lvl-head"><h2>${lv} · ${L.name}</h2><p>${L.desc}</p>
 <p style="font-size:.82rem;color:var(--accent);margin-top:8px">⚑ Cada 5 lecciones hay un examen (mín. 8/10). Si lo repruebas, esas lecciones se reinician y deberás cursarlas otra vez.</p></div>
 <div class="topics">`;
 const plan=EXAM_PLAN[lv]||[];
 L.topics.forEach((t,i)=>{
  const has=!!CONTENT[t.id],locked=isLocked(lv,i),prog=topicProgress(t.id);
  if(locked){
   h+=`<div class="topic lockd"><div class="num">🔒</div><div><h4>${t.t}</h4><p>${t.d}</p><span class="soon">aprueba el examen anterior para desbloquear</span></div></div>`;
  }else{
   h+=`<div class="topic ${has?'open':''}" ${has?`onclick="showTopic('${t.id}',0)"`:''}>
    <div class="num">${String(i+1).padStart(2,'0')}</div>
    <div><h4>${t.t}</h4><p>${t.d}</p>
    ${has?`<span class="go">→ disponible${prog?` · ${prog}/${PHASES.length} fases`:''}</span>`:`<span class="soon">en préparation</span>`}
    </div></div>`;
  }
  /* tarjeta de examen después de cada bloque de 5 */
  const e=plan.find(x=>x.after===i+1);
  if(e){
   const def=!!EXAMS[e.id],passed=examPassed(e.id),avail=def&&examAvailable(lv,e);
   const score=state.exams[e.id];
   let cls='exam-card'+(passed?' passed':avail?' avail':''),inner;
   if(!def)inner=`<span class="soon">en préparation</span>`;
   else if(passed)inner=`<span class="go">✓ aprobado · ${score}/10</span>`;
   else if(avail)inner=`<span class="go">→ listo para presentar</span>`;
   else inner=`<span class="soon">completa las ${e.final?'30':'5'} lecciones del bloque (todas las fases) para desbloquear${score!==undefined?` · último intento: ${score}/10`:''}</span>`;
   h+=`<div class="topic ${cls}" ${def&&avail&&!passed?`onclick="showExam('${e.id}')"`:''} ${passed?`onclick="showExam('${e.id}')"`:''}>
    <div class="num">📝</div><div><h4>${e.final?`Examen DELF blanc · Nivel ${lv}`:`Examen ${e.after/5} · Leçons ${e.after-4}–${e.after}`}</h4>
    <p>Comprensión oral + lectura + estructuras · mínimo 8/10</p>${inner}</div></div>`;
  }
 });
 h+='</div>';
 app.innerHTML=h;window.scrollTo(0,0);
}

function findTopic(tid){for(const lv in LEVELS){const t=LEVELS[lv].topics.find(x=>x.id===tid);if(t)return{lv,t}}return null}

function showTopic(tid,phaseIdx){

  }).join('')}</div>

 </div>

  ${phaseIdx<PHASES.length-1?`<button class="btn btn-p" onclick="showTopic('${tid}',${phaseIdx+1})">${PHASES[phaseIdx+1].n} →</button>`:`<button class="btn btn-ok" onclick="showLevel('${lv}')">Terminar leçon ✓</button>`}
 </div></div>`;
 app.innerHTML=h;window.scrollTo(0,0);
 if(ph.k==='dyn')initMatch(tid,c.match);
}

 if(k==='video'){const v=c.video;return `
  <p style="font-size:.92rem;margin-bottom:6px">Francés auténtico en video. Estas búsquedas están calibradas para tu tema y nivel:</p>
  <div class="vid-grid">${v.queries.map(q=>`<a class="vid-card" target="_blank" rel="noopener" href="https://www.youtube.com/results?search_query=${encodeURIComponent(q.q)}">
   <div class="vid-ico">▶</div><div><strong>${q.label}</strong><span>Buscar en YouTube</span></div></a>`).join('')}
  <a class="vid-card tv5" target="_blank" rel="noopener" href="https://apprendre.tv5monde.com">
   <div class="vid-ico">🎬</div><div><strong>TV5Monde Apprendre</strong><span>Ejercicios oficiales con video por nivel (Alliance Française)</span></div></a></div>
  <div class="sit" style="margin-top:20px"><strong style="font-size:.82rem;letter-spacing:.06em;color:var(--blue-700)">TU MISIÓN</strong>
  <ul>${v.mision.map(m=>`<li>${m}</li>`).join('')}</ul></div>`}

 if(k==='lect'){const l=c.lect;return `<h4 class="display" style="font-size:1.15rem;margin-bottom:14px">${l.titre}</h4>
  <div class="lect-txt">${l.texte.replace(/\n/g,'<br>')}</div>
  <div style="margin:14px 0 24px"><button class="btn btn-g" onclick="speak('${l.texte.replace(/\n/g,' ').replace(/—/g,'').replace(/'/g,"\\'")}',0.88)">▶ Escuchar la lectura</button></div>
  <h4 class="display" style="font-size:1.05rem;margin-bottom:14px">Compréhension</h4>`+l.qs.map((q,i)=>quiz(q,'lc'+i)).join('')}
 return '';
}

/* ---------- quiz formativo (con feedback) ---------- */
let QUIZ={};
function quiz(q,id){
 QUIZ[id]=q;
 const opts=q.opts.map((o,i)=>({o,i})).sort(()=>Math.random()-0.5);
 return `<div class="q" id="q-${id}"><div class="stem">${q.stem}</div>
 <div class="opts">${opts.map(x=>`<div class="opt" onclick="answer('${id}',${x.i},this)">${x.o}</div>`).join('')}</div>
 <div class="fb" id="fb-${id}"></div></div>`;
}
function answer(id,i,el){
 const q=QUIZ[id],box=document.getElementById('q-'+id),fb=document.getElementById('fb-'+id);
 if(i===q.a){
  box.querySelectorAll('.opt').forEach(o=>o.classList.add('lock'));el.classList.add('ok');
  fb.className='fb show good';fb.textContent='✓ Très bien ! '+(q.fb||'');addXP(5);
 }else{
  el.classList.add('bad','lock');
  fb.className='fb show no';fb.textContent='Essaie encore — inténtalo otra vez.';
 }
}

/* ---------- matching ---------- */
function initMatch(tid,pairs){
 const game=document.getElementById('matchGame');if(!game)return;
 const fr=pairs.map((p,i)=>({t:p[0],i})).sort(()=>Math.random()-0.5);
 const es=pairs.map((p,i)=>({t:p[1],i})).sort(()=>Math.random()-0.5);
 game.innerHTML=`<div class="mcol">${fr.map(x=>`<div class="mitem" data-side="fr" data-i="${x.i}">${x.t}</div>`).join('')}</div>
 <div class="mcol">${es.map(x=>`<div class="mitem" data-side="es" data-i="${x.i}">${x.t}</div>`).join('')}</div>`;
 let sel=null,found=0;
 game.querySelectorAll('.mitem').forEach(it=>{
  it.onclick=()=>{
   if(it.classList.contains('ok'))return;
   if(it.dataset.side==='fr')speak(it.textContent);
   if(!sel){sel=it;it.classList.add('sel');return}
   if(sel===it){it.classList.remove('sel');sel=null;return}
   if(sel.dataset.side===it.dataset.side){sel.classList.remove('sel');sel=it;it.classList.add('sel');return}
   if(sel.dataset.i===it.dataset.i){
    sel.classList.remove('sel');sel.classList.add('ok');it.classList.add('ok');sel=null;found++;addXP(5);
    if(found===pairs.length)document.getElementById('matchWin').classList.add('show');
   }else{
    it.classList.add('bad');const s=sel;s.classList.remove('sel');
    setTimeout(()=>{it.classList.remove('bad')},350);sel=null;
   }
  };
 });
}

/* ================= EXÁMENES ================= */
let EXAM_ANS={},EXAM_PLAYS={};
function showExam(eid){
 stopAudio();seqCancel=true;
 const E=EXAMS[eid];EXAM_ANS={};EXAM_PLAYS={};
 const passed=examPassed(eid);
 let n=0;
 const eq=(q,id)=>{const opts=q.opts.map((o,i)=>({o,i})).sort(()=>Math.random()-0.5);
  return `<div class="q" id="q-${id}"><div class="stem"><b>${++n}.</b> ${q.stem}</div>
  <div class="opts">${opts.map(x=>`<div class="opt" onclick="examSel('${id}',${x.i},this)">${x.o}</div>`).join('')}</div></div>`};
 let h=`<div class="crumb"><a onclick="showHome()">Inicio</a> / <a onclick="showLevel('${E.lv}')">${E.lv}</a> / Examen</div>
 <div class="t-head"><div class="lvl-tag">${E.lv} · EXAMEN ${passed?'· ✓ APROBADO '+state.exams[eid]+'/10':''}</div><h2>${E.name}</h2><p>${E.desc}</p></div>
 <div class="phase-box"><h3>Partie 1 · Compréhension orale</h3><div class="sub">Cada audio se reproduce máximo 2 veces, como en el DELF real.</div>`;
 E.co.forEach((q,i)=>{h+=`<div class="lq"><div class="play-row">
  <button class="btn btn-p" id="play-co${i}" onclick="examPlay('co${i}','${q.audio.replace(/'/g,"\\'")}','${q.v||'f'}')">▶ Écouter (2 restantes)</button>
  <span>Document ${i+1}</span></div>${eq(q,'xco'+i)}</div>`});
 h+=`</div><div class="phase-box"><h3>Partie 2 · Compréhension écrite</h3><div class="sub">${E.ce.titre}</div>
 <div class="lect-txt">${E.ce.texte.replace(/\n/g,'<br>')}</div><div style="height:18px"></div>`;
 E.ce.qs.forEach((q,i)=>h+=eq(q,'xce'+i));
 h+=`</div><div class="phase-box"><h3>Partie 3 · Structures de la langue</h3><div class="sub">Gramática y vocabulario de las lecciones del bloque.</div>`;
 E.gram.forEach((q,i)=>h+=eq(q,'xgr'+i));
 h+=`</div><div class="phase-box"><h3>Partie 4 · Production écrite et orale</h3>
 <div class="sub">Estas dos partes las evalúa tu profesor con la rúbrica — no cuentan para la calificación automática.</div>
 <div class="sit"><h4>✍ Écrite</h4><p style="font-size:.9rem">${E.pe.consigne}</p><ul>${E.pe.rubric.map(r=>`<li>${r}</li>`).join('')}</ul>
 <textarea class="exam-ta" placeholder="Escribe aquí tu texto (puedes copiarlo para entregarlo)…"></textarea></div>
 <div class="sit"><h4>🎙 Orale</h4><p style="font-size:.9rem">${E.po.consigne}</p><ul>${E.po.rubric.map(r=>`<li>${r}</li>`).join('')}</ul></div>
 </div>
 <div class="phase-box" id="examEnd">
  <h3>Terminar</h3><div class="sub">Calificación automática sobre las partes 1–3 (${E.co.length+E.ce.qs.length+E.gram.length} reactivos). Mínimo para aprobar: ${PASS_MARK}/10. ⚠ Si repruebas, las lecciones del bloque se reinician.</div>
  <button class="btn btn-p" onclick="gradeExam('${eid}')">Entregar examen</button>
  <div id="examResult"></div>
 </div>`;
 app.innerHTML=h;window.scrollTo(0,0);
}
function examSel(id,i,el){
 EXAM_ANS[id]=i;
 el.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
 el.classList.add('sel');
}
function examPlay(key,text,v){
 EXAM_PLAYS[key]=(EXAM_PLAYS[key]||0)+1;
 const b=document.getElementById('play-'+key);
 if(EXAM_PLAYS[key]>=2){b.disabled=true;b.textContent='▶ Écouter (0 restantes)'}
 else b.textContent='▶ Écouter (1 restante)';
 speak(text,0.9,v);
}
function gradeExam(eid){
 const E=EXAMS[eid];
 const all=[...E.co.map((q,i)=>['xco'+i,q]),...E.ce.qs.map((q,i)=>['xce'+i,q]),...E.gram.map((q,i)=>['xgr'+i,q])];
 const missing=all.filter(([id])=>EXAM_ANS[id]===undefined).length;
 if(missing){alert('Te faltan '+missing+' reactivos por responder.');return}
 const correct=all.filter(([id,q])=>EXAM_ANS[id]===q.a).length;
 const score=Math.round(correct/all.length*100)/10;
 state.exams[eid]=score;
 const R=document.getElementById('examResult');
 if(score>=PASS_MARK){
  addXP(100);save();
  R.innerHTML=`<div class="exam-res pass">🎉 <b>Félicitations !</b> Calificación: <b>${score}/10</b> (${correct}/${all.length} correctas). Bloque desbloqueado · +100 XP.<br><button class="btn btn-ok" style="margin-top:12px" onclick="showLevel('${E.lv}')">Continuar al siguiente bloque →</button></div>`;
 }else{
  /* reprobado: se reinician las lecciones del bloque */
  const plan=EXAM_PLAN[E.lv].find(x=>x.id===eid);
  const block=LEVELS[E.lv].topics.slice(plan.final?0:plan.after-5,plan.after);
  block.forEach(t=>{delete state.done[t.id]});
  save();
  R.innerHTML=`<div class="exam-res fail">Calificación: <b>${score}/10</b> (${correct}/${all.length} correctas). Necesitas mínimo ${PASS_MARK}/10.<br>Las lecciones del bloque se han reiniciado: repásalas completas y vuelve a presentar. <i>Courage — c'est comme ça qu'on apprend !</i><br><button class="btn btn-p" style="margin-top:12px" onclick="showLevel('${E.lv}')">Volver a las lecciones</button></div>`;
 }
 document.getElementById('examEnd').scrollIntoView({behavior:'smooth'});
}

/* ================= INIT ================= */
renderXP();showHome();

</script>
